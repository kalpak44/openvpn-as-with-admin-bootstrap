name: Build and push image to GHCR

on:
  push:
    branches:
      - master
  workflow_dispatch:
  schedule:
    - cron: "0 3 1 * *" # monthly: 03:00 UTC on day 1

permissions:
  contents: read
  packages: write

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

jobs:
  build-and-push:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare image metadata
        id: prep
        shell: bash
        run: |
          IMAGE_REPO="$(echo "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}" | tr '[:upper:]' '[:lower:]')"
          SHORT_SHA="${GITHUB_SHA::7}"

          echo "image_repo=${IMAGE_REPO}" >> "$GITHUB_OUTPUT"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ steps.prep.outputs.image_repo }}
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.prep.outputs.short_sha }}

      - name: Build and push image
        id: build
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      - name: Write workflow summary
        shell: bash
        run: |
          {
            echo "## GHCR image build report"
            echo
            echo "- Repository: \`${{ github.repository }}\`"
            echo "- Branch/Event: \`${{ github.ref_name }}\` / \`${{ github.event_name }}\`"
            echo "- Commit: \`${{ github.sha }}\`"
            echo "- Short SHA tag: \`${{ steps.prep.outputs.short_sha }}\`"
            echo "- Image (latest): \`${{ steps.prep.outputs.image_repo }}:latest\`"
            echo "- Image (sha): \`${{ steps.prep.outputs.image_repo }}:${{ steps.prep.outputs.short_sha }}\`"
            echo "- Digest: \`${{ steps.build.outputs.digest }}\`"
          } >> "$GITHUB_STEP_SUMMARY"