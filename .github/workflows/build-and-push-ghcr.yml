name: Build and push image to GHCR

on:
  push:
    branches:
      - master
      - main
  workflow_dispatch:
  schedule:
    - cron: "0 3 1 * *"

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest

    env:
      REGISTRY: ghcr.io
      IMAGE_NAME: ${{ github.repository }}

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Prepare image vars
        id: vars
        shell: bash
        run: |
          IMAGE_REPO="$(echo "${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}" | tr '[:upper:]' '[:lower:]')"
          SHORT_SHA="${GITHUB_SHA::7}"

          echo "image_repo=${IMAGE_REPO}" >> "$GITHUB_OUTPUT"
          echo "image_sha=${IMAGE_REPO}:${SHORT_SHA}" >> "$GITHUB_OUTPUT"
          echo "image_latest=${IMAGE_REPO}:latest" >> "$GITHUB_OUTPUT"
          echo "short_sha=${SHORT_SHA}" >> "$GITHUB_OUTPUT"

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name == 'push'
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push image
        id: push
        if: github.event_name == 'push'
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: true
          tags: |
            ${{ steps.vars.outputs.image_latest }}
            ${{ steps.vars.outputs.image_sha }}

      - name: Build image only
        if: github.event_name != 'push'
        uses: docker/build-push-action@v6
        with:
          context: .
          platforms: linux/amd64
          push: false
          tags: |
            ${{ steps.vars.outputs.image_sha }}

      - name: Generate build report
        run: |
          echo "### OpenVPN Access Server Image Build" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "- Status: built and pushed to GHCR" >> "$GITHUB_STEP_SUMMARY"
          else
            echo "- Status: built (manual or scheduled run)" >> "$GITHUB_STEP_SUMMARY"
          fi
          echo "- Platform: \`linux/amd64\`" >> "$GITHUB_STEP_SUMMARY"
          echo "- SHA tag: \`${{ steps.vars.outputs.image_sha }}\`" >> "$GITHUB_STEP_SUMMARY"
          if [ "${{ github.event_name }}" = "push" ]; then
            echo "- Latest tag: \`${{ steps.vars.outputs.image_latest }}\`" >> "$GITHUB_STEP_SUMMARY"
            echo "- Digest: \`${{ steps.push.outputs.digest }}\`" >> "$GITHUB_STEP_SUMMARY"
          fi
